name: CI

on:
    push:
        branches: ['**']
    pull_request:
        branches: [main]

jobs:
    commitlint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install root dependencies
              run: npm ci

            - name: Lint PR title (squash merge guard)
              if: github.event_name == 'pull_request'
              env:
                  PR_TITLE: ${{ github.event.pull_request.title }}
              run: echo "$PR_TITLE" | npx commitlint --verbose

            - name: Lint commits (PR)
              if: github.event_name == 'pull_request'
              run: >
                  npx commitlint
                  --from ${{ github.event.pull_request.base.sha }}
                  --to ${{ github.event.pull_request.head.sha }}
                  --verbose

            - name: Lint commits (push)
              if: github.event_name == 'push'
              env:
                  BEFORE: ${{ github.event.before }}
                  AFTER: ${{ github.event.after }}
              run: |
                  NULL_SHA="0000000000000000000000000000000000000000"

                  if [ "$BEFORE" != "$NULL_SHA" ] && git cat-file -e "$BEFORE" 2>/dev/null; then
                    # Normal push — lint the pushed range
                    echo "Linting $BEFORE..$AFTER"
                    npx commitlint --from "$BEFORE" --to "$AFTER" --verbose
                  else
                    # New branch or force push — only lint the latest commit.
                    # Full-range validation happens in the PR check, not here.
                    echo "New branch or force push — linting last commit only"
                    npx commitlint --last --verbose
                  fi

    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [18, 22]

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - name: Install root dependencies
              run: npm ci

            - name: Install server dependencies
              run: npm ci --prefix server

            - name: Lint
              run: npm run lint

            - name: Check formatting
              run: npm run format:check

            - name: Test
              run: npm test

            - name: Test (frontend)
              run: npm run test:frontend

            - name: Smoke — wire format
              run: npm run smoke:wire-format
