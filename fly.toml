# fly.toml app configuration file generated for placeecho-geo-sonification on 2026-04-24T13:22:50-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'placeecho-geo-sonification'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  ALLOWED_ORIGINS = 'https://placeecho.com'
  NODE_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    # Generous grace period: first boot reloads the 17k-grid spatial
    # index from the pre-warmed cache (~1-2s) before /health returns 200.
    interval = '30s'
    timeout = '5s'
    grace_period = '60s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

[[vm]]
  # 512 MB: the in-memory spatial index peaks around ~150-200 MB and
  # node's virtual-memory footprint under Alpine libc exceeds 800 MB,
  # which Fly's 256 MB VMs OOM-kill despite plentiful RSS headroom.
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
