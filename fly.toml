# Fly.io deployment manifest for the geo-sonification backend.
#
# This app hosts only the Node.js HTTP + WebSocket server; the frontend
# ships to Cloudflare Pages and large static assets (PMTiles, ambience
# WAVs) live in Cloudflare R2. See docs/ARCHITECTURE.md for the full
# topology.

app = "placeecho-geo-sonification"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  # Accept requests from the production frontend plus Cloudflare Pages
  # preview domains. Extend this list when adding staging subdomains.
  ALLOWED_ORIGINS = "https://placeecho.com"

[http_service]
  internal_port = 8080
  force_https = true
  # Suspend (not destroy) machines when idle — resumes in ~1-2s on next
  # request, and the pre-warmed cache means no 10-30s CSV parsing penalty.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
